<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campaign • Astral Forge</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0b0d;
  --text:rgba(255,255,255,.92);
  --muted:rgba(255,255,255,.72);
  --border:rgba(255,255,255,.12);
  --panel:rgba(0,0,0,.35);
  --gold:#b99054;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}

nav{
  padding:18px 40px;
  border-bottom:1px solid var(--border);
  background:rgba(0,0,0,.6);
}

nav a{
  color:var(--text);
  text-decoration:none;
  font-weight:500;
}

.hero{
  height:360px;
  background:#000 center/cover no-repeat;
  display:flex;
  align-items:flex-end;
  padding:40px;
  border-bottom:1px solid var(--border);
}

.hero h1{
  font-family:Georgia,serif;
  font-size:42px;
  margin:0;
}

main{
  max-width:1100px;
  margin:40px auto 80px;
  padding:0 20px;
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:40px;
}

.section{
  margin-bottom:40px;
}

.section h2{
  font-family:Cinzel,serif;
  margin-bottom:14px;
}

.meta-box{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:16px;
  padding:20px;
}

.meta-row{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
  font-size:14px;
}

.button{
  display:block;
  text-align:center;
  padding:12px;
  border-radius:12px;
  margin-top:20px;
  text-decoration:none;
  font-weight:600;
  border:1px solid rgba(185,144,84,.6);
  background:linear-gradient(135deg,rgba(185,144,84,.2),rgba(0,0,0,.2));
  color:#fff;
  transition:.2s;
}

.button:hover{
  transform:translateY(-2px);
  border-color:rgba(185,144,84,.9);
}

.loading{
  text-align:center;
  padding:80px;
  color:var(--muted);
}

@media(max-width:900px){
  main{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<nav>
  <a href="/campaigns/">← Back to Campaigns</a>
</nav>

<div id="app">
  <div class="loading">Loading campaign...</div>
</div>

<script>
async function loadCampaign() {
  const slug = window.location.pathname.split("/").filter(Boolean).pop();

  const res = await fetch("/api/campaigns/" + slug);
  const json = await res.json();

  if (!json.ok) {
    document.getElementById("app").innerHTML =
      "<div class='loading'>Campaign not found.</div>";
    return;
  }

  const c = json.campaign;

  document.title = c.title + " • Astral Forge";

  const heroStyle = c.thumb
    ? "style='background-image:url(" + c.thumb + ")'"
    : "";

  document.getElementById("app").innerHTML = `
    <div class="hero" ${heroStyle}>
      <h1>${c.title}</h1>
    </div>

    <main>
      <div>
        <div class="section">
          <h2>Overview</h2>
          <p>${c.blurb || c.hook || ""}</p>
        </div>

        <div class="section">
          <h2>Details</h2>
          <p>${c.data?.basic?.description || ""}</p>
        </div>
      </div>

      <div>
        <div class="meta-box">
          <div class="meta-row"><span>System</span><strong>${c.system || "-"}</strong></div>
          <div class="meta-row"><span>Schedule</span><strong>${c.day || ""} ${c.time || ""}</strong></div>
          <div class="meta-row"><span>Seats</span><strong>${c.seatsOpen}/${c.seatsTotal}</strong></div>
          <div class="meta-row"><span>Price</span><strong>${c.price || "-"}</strong></div>

          <a class="button" href="/contact/">Request Seat</a>
        </div>
      </div>
    </main>
  `;
}

loadCampaign();
</script>

</body>
</html>
